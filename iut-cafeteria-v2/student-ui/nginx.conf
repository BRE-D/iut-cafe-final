server {
  listen 80;

  # Proxy API calls to gateway
  location /api/ {
    proxy_pass http://gateway:3000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Proxy SSE (Server-Sent Events) to notification hub — no buffering
  location /events/ {
    proxy_pass http://notification-hub:3005/events/;
    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_set_header Cache-Control 'no-cache';
    proxy_set_header Host $host;
    proxy_buffering off;
    proxy_read_timeout 24h;
    proxy_cache off;
  }

  # SPA fallback — serve index.html for ALL routes including /admin
  # This lets React Router / window.location handle /admin client-side
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }
}
