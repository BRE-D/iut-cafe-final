name: Automated Validation (CI/CD)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Integrity Tests
    runs-on: ubuntu-latest

    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install Dependencies
        run: npm install

      - name: 🧪 Run Unit Tests (Order Validation & Stock Deduction)
        run: npm test

      - name: 🏗 Build Project (Sanity Check)
        run: npm run build

      - name: 🐳 Build Docker Images (All Services)
        working-directory: ./iut-cafeteria-v2
        run: docker compose build

      - name: 🚀 Verify Services Launch
        working-directory: ./iut-cafeteria-v2
        run: |
          docker compose up -d
          sleep 15
          curl -f http://localhost:3000/health || exit 1
          curl -f http://localhost:3001/health || exit 1
          curl -f http://localhost:3002/health || exit 1
          curl -f http://localhost:3005/health || exit 1
          curl -f http://localhost:5173 || exit 1
          docker compose down
